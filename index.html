<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minecraft雪球菜单制作器</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <link rel="apple-touch-icon" href="./icon.png">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to top, #1a237e 0%, #0d1642 30%, #000000 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 900px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        h1 {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 5px;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        label {
            font-size: 0.9rem;
            color: #a0a0ff;
            font-weight: 500;
        }

        .editor-container {
            position: relative;
            min-height: 250px;
        }

        #color-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            pointer-events: none;
            z-index: 1;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 150, 255, 0.3);
        }

        #input-text {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            padding: 12px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
            overflow: auto;
            resize: none;
            border: none;
            outline: none;
            background: transparent;
            color: transparent;
            caret-color: #ffffff;
            z-index: 2;
        }

            #input-text::selection {
                background: rgba(102, 126, 234, 0.4);
                color: transparent;
            }

        .mc-0 {
            color: #000000;
            text-shadow: 1px 1px 0 #444;
        }

        .mc-1 {
            color: #0000AA;
        }

        .mc-2 {
            color: #00AA00;
        }

        .mc-3 {
            color: #00AAAA;
        }

        .mc-4 {
            color: #AA0000;
        }

        .mc-5 {
            color: #AA00AA;
        }

        .mc-6 {
            color: #FFAA00;
        }

        .mc-7 {
            color: #AAAAAA;
        }

        .mc-8 {
            color: #555555;
        }

        .mc-9 {
            color: #5555FF;
        }

        .mc-a {
            color: #55FF55;
        }

        .mc-b {
            color: #55FFFF;
        }

        .mc-c {
            color: #FF5555;
        }

        .mc-d {
            color: #FF55FF;
        }

        .mc-e {
            color: #FFFF55;
        }

        .mc-f {
            color: #FFFFFF;
        }

        .mc-l {
            font-weight: bold;
        }

        .mc-m {
            text-decoration: line-through;
        }

        .mc-n {
            text-decoration: underline;
        }

        .mc-o {
            font-style: italic;
        }

        .mc-r {
            color: inherit;
            font-weight: normal;
            text-decoration: none;
            font-style: normal;
        }

        .show-codes .mc-code {
            display: inline;
            opacity: 0.3;
            font-size: 0.8em;
            vertical-align: middle;
        }

        .hide-codes .mc-code {
            display: none;
        }

        input[type="text"] {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            padding: 10px;
            color: #ffffff;
            font-size: 0.9rem;
            font-family: 'Consolas', 'Monaco', monospace;
        }

            input[type="text"]:focus {
                outline: none;
                border-color: #667eea;
                box-shadow: 0 0 10px rgba(102, 126, 234, 0.3);
            }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: #a0a0ff;
            font-size: 0.9rem;
        }

        input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #667eea;
            cursor: pointer;
        }

        button {
            padding: 14px;
            font-size: 1rem;
            font-weight: 600;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

            button:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            }

            button:active {
                transform: translateY(0);
            }

        .button-row {
            display: flex;
            gap: 10px;
        }

            .button-row button {
                flex: 1;
            }

        .copy-btn {
            background: linear-gradient(135deg, #42b883 0%, #347474 100%);
        }

            .copy-btn:hover {
                box-shadow: 0 10px 30px rgba(66, 184, 131, 0.4);
            }

            .copy-btn.copied {
                background: linear-gradient(135deg, #51cf66 0%, #2b8a3e 100%);
            }

        .preview-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

            .preview-btn:hover {
                box-shadow: 0 10px 30px rgba(245, 87, 108, 0.4);
            }

            .preview-btn.playing {
                background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
                animation: pulse 1s infinite;
            }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
            }

            50% {
                opacity: 0.8;
            }
        }

        #output-text {
            min-height: 200px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 8px;
            padding: 12px;
            color: #ffffff;
            font-family: monospace;
            font-size: 0.85rem;
            resize: vertical;
        }

        .preview-section {
            margin-top: 10px;
        }

        .preview-container {
            background: rgba(0, 0, 0, 0.6);
            border: 2px solid rgba(100, 150, 255, 0.5);
            border-radius: 8px;
            padding: 20px;
            min-height: 150px;
            font-family: 'Minecraft', 'Consolas', monospace;
            font-size: 1.1rem;
            line-height: 1.8;
            white-space: pre-wrap;
            word-wrap: break-word;
            position: relative;
            overflow: hidden;
        }

            .preview-container::before {
                content: "预览区域";
                position: absolute;
                top: 5px;
                right: 10px;
                font-size: 0.7rem;
                color: rgba(100, 150, 255, 0.6);
                text-transform: uppercase;
            }

        .preview-frame-info {
            position: absolute;
            bottom: 5px;
            right: 10px;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .preview-controls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
            align-items: center;
        }

        .speed-control {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #a0a0ff;
            font-size: 0.85rem;
        }

            .speed-control input[type="range"] {
                width: 100px;
            }

        .error {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border-color: rgba(255, 107, 107, 0.3);
        }

        .hint {
            font-size: 0.8rem;
            color: #8888aa;
            margin-top: 4px;
        }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.3rem;
            }

            .editor-container {
                min-height: 200px;
            }

            .button-row {
                flex-direction: column;
            }

            .preview-controls {
                flex-wrap: wrap;
            }
        }
    </style>
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>✦ Minecraft雪球菜单制作器 ✦</h1>

        <div class="input-group">
            <label>输入编码文本</label>
            <div class="editor-container show-codes" id="editor-box">
                <div id="color-layer"></div>
                <textarea id="input-text" placeholder="$frame&#10;§8|| 超级炫酷的雪球菜单&#10;§8# 查看个人信息&#10;§8# 使用公共传送点&#10;§8# 发起TPA传送&#10;§8# 给作者点个赞&#10;§8|| 低头取消，抬头确认&#10;$end -a by_char&#10;&#10;$frame&#10;§e|| 超级炫酷的雪球菜单&#10;§b> 查看个人信息&#10;§7# 使用公共传送点&#10;§7# 发起TPA传送&#10;§7# 给作者点个赞&#10;§a|| 低头取消，抬头确认&#10;$end"></textarea>
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="show-codes" checked>
                <span>显示 § 转义符</span>
            </label>
            <div class="hint">$end 参数: -a none/by_char/by_line/by_column | --reverse 倒序</div>
        </div>

        <div class="input-group">
            <label>选择器参数</label>
            <input type="text" id="selector-param" placeholder="[]" value="[]">
        </div>

        <div class="input-group">
            <label>动画每帧行尾</label>
            <input type="text" id="line-suffix" placeholder="例如: §7|§f| 或 ▌" value="">
            <div class="hint">使用动画效果时，将该字符置于每帧的最后一行末尾（如光标效果）</div>
        </div>

        <div class="button-row">
            <button onclick="convert()">开始转换</button>
            <button class="copy-btn" onclick="copyOutput()">复制输出</button>
        </div>

        <div class="input-group">
            <label>输出</label>
            <textarea id="output-text" readonly placeholder="转换结果将显示在这里..."></textarea>
        </div>

        <div class="preview-section">
            <label>动画预览</label>
            <div class="preview-container" id="preview-box">
                <div id="preview-content">点击"预览动画"按钮查看效果</div>
                <div class="preview-frame-info" id="preview-info"></div>
            </div>
            <div class="preview-controls">
                <button class="preview-btn" id="preview-btn" onclick="playPreview()">▶ 预览动画</button>
                <div class="speed-control">
                    <span>速度:</span>
                    <input type="range" id="preview-speed" min="50" max="500" value="100" step="50">
                    <span id="speed-value">100ms</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const colorCodes = {
            '0': 'mc-0', '1': 'mc-1', '2': 'mc-2', '3': 'mc-3',
            '4': 'mc-4', '5': 'mc-5', '6': 'mc-6', '7': 'mc-7',
            '8': 'mc-8', '9': 'mc-9', 'a': 'mc-a', 'b': 'mc-b',
            'c': 'mc-c', 'd': 'mc-d', 'e': 'mc-e', 'f': 'mc-f',
            'l': 'mc-l', 'm': 'mc-m', 'n': 'mc-n', 'o': 'mc-o',
            'r': 'mc-r'
        };

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        const inputText = document.getElementById('input-text');
        const colorLayer = document.getElementById('color-layer');
        const editorBox = document.getElementById('editor-box');
        const showCodesCheck = document.getElementById('show-codes');

        inputText.addEventListener('scroll', () => {
            colorLayer.scrollTop = inputText.scrollTop;
            colorLayer.scrollLeft = inputText.scrollLeft;
        });

        showCodesCheck.addEventListener('change', (e) => {
            editorBox.classList.toggle('hide-codes', !e.target.checked);
            editorBox.classList.toggle('show-codes', e.target.checked);
            updateColorLayer();
        });

        const speedSlider = document.getElementById('preview-speed');
        const speedValue = document.getElementById('speed-value');
        speedSlider.addEventListener('input', (e) => {
            speedValue.textContent = e.target.value + 'ms';
        });

        function parseToHTML(text, showCodes) {
            let html = '';
            let currentClasses = [];
            let i = 0;

            while (i < text.length) {
                if (text[i] === '§' && i + 1 < text.length) {
                    const code = text[i + 1].toLowerCase();
                    const className = colorCodes[code];

                    if (className !== undefined) {
                        if (showCodes) {
                            html += `<span class="mc-code mc-${code}">§${text[i + 1]}</span>`;
                        }

                        if (code === 'r') {
                            currentClasses = [];
                        } else {
                            const type = '0123456789abcdef'.includes(code) ? 'color' : 'format';
                            currentClasses = currentClasses.filter(c => {
                                const cCode = c.replace('mc-', '');
                                return ('0123456789abcdef'.includes(cCode) ? 'color' : 'format') !== type;
                            });
                            currentClasses.push(className);
                        }
                        i += 2;
                        continue;
                    }
                }

                const char = text[i];
                const escaped = char.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                if (currentClasses.length > 0) {
                    html += `<span class="${currentClasses.join(' ')}">${escaped}</span>`;
                } else {
                    html += escaped;
                }
                i++;
            }

            return html || '<br>';
        }

        function updateColorLayer() {
            colorLayer.innerHTML = parseToHTML(inputText.value, showCodesCheck.checked);
        }

        inputText.addEventListener('input', updateColorLayer);
        updateColorLayer();

        function parseSelector(baseSelector) {
            if (!baseSelector || baseSelector === '[]') return ['', ''];
            let clean = baseSelector.trim();
            if (clean.startsWith('[')) clean = clean.slice(1);
            if (clean.endsWith(']')) clean = clean.slice(0, -1);
            if (!clean) return ['', ''];

            const scoresMatch = clean.match(/scores=\{([^}]*)\}/);
            let scoresContent = '';
            if (scoresMatch) {
                scoresContent = scoresMatch[1];
                clean = clean.replace(/scores=\{[^}]*\}/, '').replace(/,+/g, ',').replace(/^,|,$/g, '');
            }
            return [clean, scoresContent];
        }

        function buildSelector(baseSelector, frameNum) {
            const [normalParams, scoresParams] = parseSelector(baseSelector);
            let scoresStr = scoresParams ? `scores={${scoresParams},frame=${frameNum}}` : `scores={frame=${frameNum}}`;
            return normalParams ? `@a[${normalParams},${scoresStr}]` : `@a[${scoresStr}]`;
        }

        function parseTextWithStatesOptimized(text) {
            const units = [];
            let lastOutputCodes = [];
            let currentEffectiveCodes = [];
            let i = 0;

            while (i < text.length) {
                if (text[i] === '§' && i + 1 < text.length) {
                    const code = text[i + 1].toLowerCase();

                    if (colorCodes[code] !== undefined) {
                        if (code === 'r') {
                            currentEffectiveCodes = [];
                        } else {
                            const isColor = '0123456789abcdef'.includes(code);
                            currentEffectiveCodes = currentEffectiveCodes.filter(c => {
                                const cIsColor = '0123456789abcdef'.includes(c);
                                return cIsColor !== isColor;
                            });
                            currentEffectiveCodes.push(code);
                        }
                        i += 2;
                        continue;
                    }
                }

                const codesToAdd = [];
                for (const code of currentEffectiveCodes) {
                    if (!lastOutputCodes.includes(code)) {
                        codesToAdd.push(code);
                    }
                }

                units.push({
                    char: text[i],
                    codes: codesToAdd,
                    effectiveCodes: [...currentEffectiveCodes]
                });

                lastOutputCodes = [...currentEffectiveCodes];
                i++;
            }

            return units;
        }

        // 关键修复：逐字动画 - 只在每帧的最后一行末尾添加后缀
        function generateByCharFrames(lines, suffix, reverse) {
            const frames = [];

            // 将整段文本解析为字符单元（包含换行符）
            const allText = lines.join('\n');
            const units = parseTextWithStatesOptimized(allText);
            const totalLen = units.length;

            const indices = reverse ?
                Array.from({ length: totalLen }, (_, i) => totalLen - 1 - i) :
                Array.from({ length: totalLen }, (_, i) => i);

            for (const idx of indices) {
                const currentUnits = units.slice(0, idx + 1);

                // 重建所有行
                const resultLines = [];
                let currentLine = '';
                let lastEffectiveCodes = [];

                for (let i = 0; i < currentUnits.length; i++) {
                    const unit = currentUnits[i];

                    if (unit.char === '\n') {
                        // 换行：保存当前行（不加后缀，这不是最后一行）
                        resultLines.push(currentLine);
                        currentLine = '';
                        lastEffectiveCodes = [];
                    } else {
                        // 普通字符
                        const codesToAdd = [];
                        for (const code of unit.effectiveCodes) {
                            if (!lastEffectiveCodes.includes(code)) {
                                codesToAdd.push(code);
                            }
                        }

                        const prefix = codesToAdd.map(c => '§' + c).join('');
                        currentLine += prefix + unit.char;
                        lastEffectiveCodes = [...unit.effectiveCodes];
                    }
                }

                // 处理最后一行（未以\n结尾的行）- 这是当前帧的最后一行，添加后缀
                if (currentLine !== '' || resultLines.length === 0) {
                    if (suffix) {
                        currentLine += suffix;
                    }
                    resultLines.push(currentLine);
                }

                // 补齐剩余空行
                while (resultLines.length < lines.length) {
                    resultLines.push('');
                }

                frames.push({ lines: resultLines });
            }

            return frames;
        }

        function generateAnimationFrames(lines, mode, suffix, reverse) {
            const frames = [];

            if (mode === 'none' || !mode) {
                // 无动画模式：整帧输出，也在最后一行添加后缀
                if (suffix) {
                    lines[lines.length - 1] += suffix;
                }
                frames.push({ lines: [...lines] });
                return frames;
            }

            if (mode === 'by_char') {
                return generateByCharFrames(lines, suffix, reverse);

            } else if (mode === 'by_line') {
                const lineCount = lines.length;
                const indices = reverse ?
                    Array.from({ length: lineCount }, (_, i) => lineCount - 1 - i) :
                    Array.from({ length: lineCount }, (_, i) => i);

                for (const idx of indices) {
                    const displayLines = [];
                    for (let i = 0; i <= idx; i++) {
                        let line = lines[i];
                        // 只在当前帧的最后一行添加后缀
                        if (i === idx && suffix) {
                            line += suffix;
                        }
                        displayLines.push(line);
                    }

                    while (displayLines.length < lineCount) {
                        displayLines.push('');
                    }

                    frames.push({ lines: displayLines });
                }

            } else if (mode === 'by_column') {
                const parsedLines = lines.map(line => parseTextWithStatesOptimized(line));
                const maxLen = Math.max(...parsedLines.map(l => l.length));
                const lineCount = lines.length;

                const cols = reverse ?
                    Array.from({ length: maxLen }, (_, i) => maxLen - 1 - i) :
                    Array.from({ length: maxLen }, (_, i) => i);

                for (const col of cols) {
                    const displayLines = [];

                    for (let lineIdx = 0; lineIdx < parsedLines.length; lineIdx++) {
                        const units = parsedLines[lineIdx];
                        let result = '';
                        let lastEffectiveCodes = [];

                        for (let i = 0; i <= col && i < units.length; i++) {
                            const codesToAdd = [];
                            for (const code of units[i].effectiveCodes) {
                                if (!lastEffectiveCodes.includes(code)) {
                                    codesToAdd.push(code);
                                }
                            }

                            const prefix = codesToAdd.map(c => '§' + c).join('');
                            result += prefix + units[i].char;
                            lastEffectiveCodes = [...units[i].effectiveCodes];
                        }

                        displayLines.push(result);
                    }

                    // 在当前帧的最后一行添加后缀
                    if (suffix) {
                        displayLines[displayLines.length - 1] += suffix;
                    }

                    frames.push({ lines: displayLines });
                }
            }

            return frames;
        }

        function parseEndArgs(line) {
            const args = { a: 'none', reverse: false };
            const tokens = line.split(/\s+/);
            let i = 0;

            while (i < tokens.length) {
                const token = tokens[i];

                if (token === '-a' && i + 1 < tokens.length) {
                    args.a = tokens[i + 1];
                    i += 2;
                } else if (token === '--reverse') {
                    args.reverse = true;
                    i += 1;
                } else if (token.startsWith('-')) {
                    const key = token.replace(/^-+/, '');
                    if (i + 1 < tokens.length && !tokens[i + 1].startsWith('-')) {
                        args[key] = tokens[i + 1];
                        i += 2;
                    } else {
                        args[key] = true;
                        i += 1;
                    }
                } else {
                    i++;
                }
            }

            return args;
        }

        let generatedFrames = [];
        let isPlaying = false;
        let playInterval = null;

        function convert() {
            const input = inputText.value;
            const selectorParam = document.getElementById('selector-param').value || '[]';
            const lineSuffix = document.getElementById('line-suffix').value;
            const outputArea = document.getElementById('output-text');

            try {
                const lines = input.split('\n');
                let allFrames = [];
                let currentLines = [];
                let autoFrameNum = 0;
                let currentEndArgs = { a: 'none', reverse: false };

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const trimmed = line.trim();

                    if (!trimmed && autoFrameNum === 0) continue;

                    const frameMatch = trimmed.match(/^\$frame-?(\d*)/);
                    if (frameMatch) {
                        if (currentLines.length > 0 && autoFrameNum > 0) {
                            const animFrames = generateAnimationFrames(
                                currentLines,
                                currentEndArgs.a,
                                lineSuffix,
                                currentEndArgs.reverse
                            );
                            for (const af of animFrames) {
                                allFrames.push({
                                    num: autoFrameNum++,
                                    lines: af.lines
                                });
                            }
                        }

                        const numStr = frameMatch[1];
                        if (numStr) {
                            autoFrameNum = parseInt(numStr);
                        } else {
                            autoFrameNum = autoFrameNum > 0 ? autoFrameNum + 1 : 1;
                        }

                        currentLines = [];
                        currentEndArgs = { a: 'none', reverse: false };
                        continue;
                    }

                    if (trimmed.startsWith('$end')) {
                        currentEndArgs = parseEndArgs(trimmed);

                        if (currentLines.length > 0 && autoFrameNum > 0) {
                            const animFrames = generateAnimationFrames(
                                currentLines,
                                currentEndArgs.a,
                                lineSuffix,
                                currentEndArgs.reverse
                            );
                            for (const af of animFrames) {
                                allFrames.push({
                                    num: autoFrameNum++,
                                    lines: af.lines
                                });
                            }
                        }

                        currentLines = [];
                        currentEndArgs = { a: 'none', reverse: false };
                        continue;
                    }

                    if (autoFrameNum > 0 && line) {
                        currentLines.push(line);
                    }
                }

                if (currentLines.length > 0 && autoFrameNum > 0) {
                    const animFrames = generateAnimationFrames(
                        currentLines,
                        currentEndArgs.a,
                        lineSuffix,
                        currentEndArgs.reverse
                    );
                    for (const af of animFrames) {
                        allFrames.push({
                            num: autoFrameNum++,
                            lines: af.lines
                        });
                    }
                }

                if (allFrames.length === 0) {
                    throw new Error('未找到有效的帧定义');
                }

                generatedFrames = allFrames;

                let output = '';
                for (const frame of allFrames) {
                    const content = frame.lines.join('\\n');
                    const selector = buildSelector(selectorParam, frame.num);
                    const rawtext = JSON.stringify({ rawtext: [{ text: content }] }, null, 0);
                    output += `titleraw ${selector} actionbar ${rawtext}\n\n`;
                }

                outputArea.value = output.trim();
                outputArea.classList.remove('error');

                document.getElementById('preview-content').textContent = '点击"预览动画"按钮查看效果 (' + allFrames.length + ' 帧)';

            } catch (err) {
                outputArea.value = `错误: ${err.message}`;
                outputArea.classList.add('error');
                generatedFrames = [];
            }
        }

        function playPreview() {
            if (isPlaying) {
                stopPreview();
                return;
            }

            if (generatedFrames.length === 0) {
                convert();
                if (generatedFrames.length === 0) return;
            }

            isPlaying = true;
            const btn = document.getElementById('preview-btn');
            const previewContent = document.getElementById('preview-content');
            const previewInfo = document.getElementById('preview-info');
            const speed = parseInt(document.getElementById('preview-speed').value);

            btn.textContent = '⏹ 停止播放';
            btn.classList.add('playing');

            let currentFrame = 0;
            const totalFrames = generatedFrames.length;

            function showFrame() {
                if (currentFrame >= totalFrames) {
                    currentFrame = 0;
                }

                const frame = generatedFrames[currentFrame];
                const htmlContent = frame.lines.map(line => parseToHTML(line, false)).join('<br>');
                previewContent.innerHTML = htmlContent;
                previewInfo.textContent = `帧 ${currentFrame + 1} / ${totalFrames}`;

                currentFrame++;
            }

            showFrame();
            playInterval = setInterval(showFrame, speed);
        }

        function stopPreview() {
            isPlaying = false;
            const btn = document.getElementById('preview-btn');
            btn.textContent = '▶ 预览动画';
            btn.classList.remove('playing');

            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function copyOutput() {
            const outputArea = document.getElementById('output-text');
            const copyBtn = document.querySelector('.copy-btn');

            if (!outputArea.value) {
                return;
            }

            outputArea.select();
            outputArea.setSelectionRange(0, 99999);

            try {
                navigator.clipboard.writeText(outputArea.value).then(() => {
                    showCopiedFeedback(copyBtn);
                }).catch(() => {
                    document.execCommand('copy');
                    showCopiedFeedback(copyBtn);
                });
            } catch (err) {
                document.execCommand('copy');
                showCopiedFeedback(copyBtn);
            }
        }

        function showCopiedFeedback(btn) {
            const originalText = btn.textContent;
            btn.textContent = '✓ 已复制';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 1500);
        }
    </script>
</body>
</html>
