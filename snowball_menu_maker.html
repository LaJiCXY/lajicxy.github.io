        .toolbar {

        }

        input[type="text"] {

<body>
    <nav class="toolbar">
        <a href="./index.html" target="_self" class="home-btn">✦返回主页✦</a>
    </nav>

    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>✦ Minecraft雪球菜单制作器 ✦</h1>

        <div class="input-group">
            <label>输入编码文本</label>
            <div class="editor-container show-codes" id="editor-box">
                <div id="color-layer"></div>
                <textarea id="input-text" placeholder="$frame&#10;§8|| 超级炫酷的雪球菜单&#10;$s1{§8# 查看个人信息}&#10;$s2{§8# 使用公共传送点}&#10;$s3{§8# 发起TPA传送}&#10;$s4{§8# 给作者点个赞}&#10;§8|| 低头取消，抬头确认&#10;$end -a by_char&#10;&#10;$frame+1..4&#10;§e|| 超级炫酷的雪球菜单&#10;$s1{§b> 查看个人信息}&#10;$s2{§7# 使用公共传送点}&#10;$s3{§7# 发起TPA传送}&#10;$s4{§7# 给作者点个赞}&#10;§a|| 低头取消，抬头确认&#10;$end"></textarea>
            </div>
            <label class="checkbox-group">
                <input type="checkbox" id="show-codes" checked>
                <span>显示 § 转义符</span>
            </label>
            <div class="hint">$frame+2..5 帧范围 | $s1{} 选项文本 | $end -a by_char/by_line/by_column --reverse</div>
        </div>

        <div class="input-group">
            <label>选择器参数</label>
            <input type="text" id="selector-param" placeholder="[]" value="[]">
        </div>

        <div class="input-group">
            <label>动画每帧行尾</label>
            <input type="text" id="line-suffix" placeholder="例如: §7|§f| 或 ▌" value="">
            <div class="hint">使用动画效果时，将该字符置于每帧的最后一行末尾（如光标效果）</div>
        </div>

        <div class="input-group">
            <label>选项标记设置</label>
            <div class="option-marks-grid">
                <input type="text" id="sel-head" placeholder="选择行头 (如: >)" value="">
                <input type="text" id="sel-tail" placeholder="选择行尾 (如: |)" value="">
                <input type="text" id="unsel-head" placeholder="未选择行头 (如: #)" value="">
                <input type="text" id="unsel-tail" placeholder="未选择行尾 (如: |)" value="">
            </div>
            <div class="hint">为不同选项状态添加前后标记，scores会自动添加 slc=选项</div>
        </div>

        <div class="button-row">
            <button onclick="convert()">开始转换</button>
            <button class="copy-btn" onclick="copyOutput()">复制输出</button>
        </div>

        <div class="input-group">
            <label>输出</label>
            <textarea id="output-text" readonly placeholder="转换结果将显示在这里..."></textarea>
        </div>

        <div class="preview-section">
            <label>动画预览</label>
            <div class="preview-container" id="preview-box">
                <div id="preview-content">点击"预览动画"按钮查看效果</div>
                <div class="preview-frame-info" id="preview-info"></div>
            </div>
            <div class="preview-controls">
                <button class="preview-btn" id="preview-btn" onclick="playPreview()">▶ 预览动画</button>

                <div class="option-control">
                    <button class="option-btn" id="prev-option" onclick="changePreviewOption(-1)" disabled>◀ 上一个</button>
                    <label>选项 (slc):</label>
                    <span class="option-display" id="current-slc">0</span>
                    <button class="option-btn" id="next-option" onclick="changePreviewOption(1)" disabled>下一个 ▶</button>
                </div>

                <div class="speed-control">
                    <span>速度:</span>
                    <input type="range" id="preview-speed" min="50" max="500" value="100" step="50">
                    <span id="speed-value">100ms</span>
                </div>
            </div>
        </div>

    <script>
        const colorCodes = {
            '0': 'mc-0', '1': 'mc-1', '2': 'mc-2', '3': 'mc-3',
            '4': 'mc-4', '5': 'mc-5', '6': 'mc-6', '7': 'mc-7',
            '8': 'mc-8', '9': 'mc-9', 'a': 'mc-a', 'b': 'mc-b',
            'c': 'mc-c', 'd': 'mc-d', 'e': 'mc-e', 'f': 'mc-f',
            'l': 'mc-l', 'm': 'mc-m', 'n': 'mc-n', 'o': 'mc-o',
            'r': 'mc-r'
        };

        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }
        createStars();

        const inputText = document.getElementById('input-text');
        const colorLayer = document.getElementById('color-layer');
        const editorBox = document.getElementById('editor-box');
        const showCodesCheck = document.getElementById('show-codes');

        inputText.addEventListener('scroll', () => {
            colorLayer.scrollTop = inputText.scrollTop;
            colorLayer.scrollLeft = inputText.scrollLeft;
        });

        showCodesCheck.addEventListener('change', (e) => {
            editorBox.classList.toggle('hide-codes', !e.target.checked);
            editorBox.classList.toggle('show-codes', e.target.checked);
            updateColorLayer();
        });

        const speedSlider = document.getElementById('preview-speed');
        const speedValue = document.getElementById('speed-value');
        speedSlider.addEventListener('input', (e) => {
            speedValue.textContent = e.target.value + 'ms';
        });

        function parseToHTML(text, showCodes) {
            let html = '';
            let currentClasses = [];
            let i = 0;

            while (i < text.length) {
                if (text[i] === '§' && i + 1 < text.length) {
                    const code = text[i + 1].toLowerCase();
                    const className = colorCodes[code];

                    if (className !== undefined) {
                        if (showCodes) {
                            html += `<span class="mc-code mc-${code}">§${text[i + 1]}</span>`;
                        }

                        if (code === 'r') {
                            currentClasses = [];
                        } else {
                            const type = '0123456789abcdef'.includes(code) ? 'color' : 'format';
                            currentClasses = currentClasses.filter(c => {
                                const cCode = c.replace('mc-', '');
                                return ('0123456789abcdef'.includes(cCode) ? 'color' : 'format') !== type;
                            });
                            currentClasses.push(className);
                        }
                        i += 2;
                        continue;
                    }
                }

                const char = text[i];
                const escaped = char.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

                if (currentClasses.length > 0) {
                    html += `<span class="${currentClasses.join(' ')}">${escaped}</span>`;
                } else {
                    html += escaped;
                }
                i++;
            }

            return html || '<br>';
        }

        function updateColorLayer() {
            colorLayer.innerHTML = parseToHTML(inputText.value, showCodesCheck.checked);
        }

        inputText.addEventListener('input', updateColorLayer);
        updateColorLayer();


        // 解析行内选项标记 $sN{内容}
        function parseInlineOptions(line) {
            const regex = /\$s(\d+)\{([^}]*)\}/g;
            const options = [];
            let match;
            while ((match = regex.exec(line)) !== null) {
                options.push({
                    index: parseInt(match[1]),
                    content: match[2],
                    fullMatch: match[0]
                });
            }
            return options;
        }

        // 替换行内选项，根据当前选中的slc应用标记
        function replaceInlineOptions(line, selectedSlc, selHead, selTail, unselHead, unselTail) {
            return line.replace(/\$s(\d+)\{([^}]*)\}/g, (match, indexStr, content) => {
                const index = parseInt(indexStr);
                const isSelected = index === selectedSlc;
                const head = isSelected ? selHead : unselHead;
                const tail = isSelected ? selTail : unselTail;

                let result = content;
                if (head) result = head + result;
                if (tail) result = result + tail;
                return result;
            });
        }

        function parseSelector(baseSelector, frameValue, slcValue) {
            if (!baseSelector || baseSelector === '[]') {
                baseSelector = '';
            }

            let clean = baseSelector.trim();
            if (clean.startsWith('[')) clean = clean.slice(1);
            if (clean.endsWith(']')) clean = clean.slice(0, -1);

            // 构建 scores 条件
            const scores = [];
            if (frameValue !== null && frameValue >= 0) {
                scores.push(`frame=${frameValue}`);
            }
            if (slcValue !== null && slcValue >= 0) {
                scores.push(`slc=${slcValue}`);
            }

            if (scores.length > 0) {
                if (clean) {
                    clean += `,scores={${scores.join(',')}}`;
                } else {
                    clean = `scores={${scores.join(',')}}`;
                }
            }

            if (!clean) return '@a';
            return `@a[${clean}]`;
        }

        function parseTextWithStatesOptimized(text) {
            const units = [];
            let lastOutputCodes = [];
            let currentEffectiveCodes = [];
            let i = 0;

            while (i < text.length) {
                if (text[i] === '§' && i + 1 < text.length) {
                    const code = text[i + 1].toLowerCase();

                    if (colorCodes[code] !== undefined) {
                        if (code === 'r') {
                            currentEffectiveCodes = [];
                        } else {
                            const isColor = '0123456789abcdef'.includes(code);
                            currentEffectiveCodes = currentEffectiveCodes.filter(c => {
                                const cIsColor = '0123456789abcdef'.includes(c);
                                return cIsColor !== isColor;
                            });
                            currentEffectiveCodes.push(code);
                        }
                        i += 2;
                        continue;
                    }
                }

                const codesToAdd = [];
                for (const code of currentEffectiveCodes) {
                    if (!lastOutputCodes.includes(code)) {
                        codesToAdd.push(code);
                    }
                }

                units.push({
                    char: text[i],
                    codes: codesToAdd,
                    effectiveCodes: [...currentEffectiveCodes]
                });

                lastOutputCodes = [...currentEffectiveCodes];
                i++;
            }

            return units;
        }

        function generateByCharFrames(lines, suffix, reverse) {
            const frames = [];
            const allText = lines.join('\n');
            const units = parseTextWithStatesOptimized(allText);
            const totalLen = units.length;

            const indices = reverse ?
                Array.from({ length: totalLen }, (_, i) => totalLen - 1 - i) :
                Array.from({ length: totalLen }, (_, i) => i);

            for (const idx of indices) {
                const currentUnits = units.slice(0, idx + 1);
                const resultLines = [];
                let currentLine = '';
                let lastEffectiveCodes = [];

                for (let i = 0; i < currentUnits.length; i++) {
                    const unit = currentUnits[i];

                    if (unit.char === '\n') {
                        resultLines.push(currentLine);
                        currentLine = '';
                        lastEffectiveCodes = [];
                    } else {
                        const codesToAdd = [];
                        for (const code of unit.effectiveCodes) {
                            if (!lastEffectiveCodes.includes(code)) {
                                codesToAdd.push(code);
                            }
                        }

                        const prefix = codesToAdd.map(c => '§' + c).join('');
                        currentLine += prefix + unit.char;
                        lastEffectiveCodes = [...unit.effectiveCodes];
                    }
                }

                if (currentLine !== '' || resultLines.length === 0) {
                    if (suffix) {
                        currentLine += suffix;
                    }
                    resultLines.push(currentLine);
                }

                while (resultLines.length < lines.length) {
                    resultLines.push('');
                }

                frames.push({ lines: resultLines });
            }

            return frames;
        }

        function generateAnimationFrames(lines, mode, suffix, reverse) {
            const frames = [];

            if (mode === 'none' || !mode) {
                if (suffix) {
                    lines[lines.length - 1] += suffix;
                }
                frames.push({ lines: [...lines] });
                return frames;
            }

            if (mode === 'by_char') {
                return generateByCharFrames(lines, suffix, reverse);

            } else if (mode === 'by_line') {
                const lineCount = lines.length;
                const indices = reverse ?
                    Array.from({ length: lineCount }, (_, i) => lineCount - 1 - i) :
                    Array.from({ length: lineCount }, (_, i) => i);

                for (const idx of indices) {
                    const displayLines = [];
                    for (let i = 0; i <= idx; i++) {
                        let line = lines[i];
                        if (i === idx && suffix) {
                            line += suffix;
                        }
                        displayLines.push(line);
                    }

                    while (displayLines.length < lineCount) {
                        displayLines.push('');
                    }

                    frames.push({ lines: displayLines });
                }

            } else if (mode === 'by_column') {
                const parsedLines = lines.map(line => parseTextWithStatesOptimized(line));
                const maxLen = Math.max(...parsedLines.map(l => l.length));
                const lineCount = lines.length;

                const cols = reverse ?
                    Array.from({ length: maxLen }, (_, i) => maxLen - 1 - i) :
                    Array.from({ length: maxLen }, (_, i) => i);

                for (const col of cols) {
                    const displayLines = [];

                    for (let lineIdx = 0; lineIdx < parsedLines.length; lineIdx++) {
                        const units = parsedLines[lineIdx];
                        let result = '';
                        let lastEffectiveCodes = [];

                        for (let i = 0; i <= col && i < units.length; i++) {
                            const codesToAdd = [];
                            for (const code of units[i].effectiveCodes) {
                                if (!lastEffectiveCodes.includes(code)) {
                                    codesToAdd.push(code);
                                }
                            }

                            const prefix = codesToAdd.map(c => '§' + c).join('');
                            result += prefix + units[i].char;
                            lastEffectiveCodes = [...units[i].effectiveCodes];
                        }

                        displayLines.push(result);
                    }

                    if (suffix) {
                        displayLines[displayLines.length - 1] += suffix;
                    }

                    frames.push({ lines: displayLines });
                }
            }

            return frames;
        }

        function parseEndArgs(line) {
            const args = { a: 'none', reverse: false };
            const tokens = line.split(/\s+/);
            let i = 0;

            while (i < tokens.length) {
                const token = tokens[i];

                if (token === '-a' && i + 1 < tokens.length) {
                    args.a = tokens[i + 1];
                    i += 2;
                } else if (token === '--reverse') {
                    args.reverse = true;
                    i += 1;
                } else if (token.startsWith('-')) {
                    const key = token.replace(/^-+/, '');
                    if (i + 1 < tokens.length && !tokens[i + 1].startsWith('-')) {
                        args[key] = tokens[i + 1];
                        i += 2;
                    } else {
                        args[key] = true;
                        i += 1;
                    }
                } else {
                    i++;
                }
            }

            return args;
        }

        function parseFrameSyntax(line, lastFrameNum) {
            const match = line.match(/^\$frame(-?\d*|\+(\d+)(\.\.(\d+))?)?/);
            if (!match) return null;

            const baseNum = lastFrameNum > 0 ? lastFrameNum : 0;

            if (!match[1]) {
                return [baseNum + 1];
            } else if (match[1].startsWith('+')) {
                const start = parseInt(match[2]);
                if (match[3]) {
                    const end = parseInt(match[4]);
                    const frames = [];
                    for (let i = start; i <= end; i++) {
                        frames.push(baseNum + i);
                    }
                    return frames;
                } else {
                    return [baseNum + start];
                }
            } else {
                const num = parseInt(match[1]);
                // 支持显式指定 0，否则默认 baseNum + 1
                return [num >= 0 ? num : baseNum + 1];
            }
        }

        function parseOption(line) {
            const match = line.match(/^\$s(\d+)\{([^}]*)\}$/);
            if (!match) return null;
            return {
                index: parseInt(match[1]),
                content: match[2]
            };
        }

        function applyOptionMarks(content, optionIndex, selectedIndex, selHead, selTail, unselHead, unselTail) {
            const isSelected = optionIndex === selectedIndex;
            const head = isSelected ? selHead : unselHead;
            const tail = isSelected ? selTail : unselTail;

            let result = content;
            if (head) result = head + result;
            if (tail) result = result + tail;

            return result;
        }

        // 全局变量
        let generatedFrames = [];
        let frameGroups = []; // 存储帧组数据，用于预览切换选项
        let isPlaying = false;
        let playInterval = null;
        let currentPreviewSlc = 0; // 当前预览的选项，0表示无选择
        let maxOptionCount = 0; // 最大选项数

        // 更新预览选项按钮状态
        function updateOptionButtons() {
            const prevBtn = document.getElementById('prev-option');
            const nextBtn = document.getElementById('next-option');
            const slcDisplay = document.getElementById('current-slc');

            slcDisplay.textContent = currentPreviewSlc;

            prevBtn.disabled = maxOptionCount === 0 || currentPreviewSlc <= 0;
            nextBtn.disabled = maxOptionCount === 0 || currentPreviewSlc >= maxOptionCount;
        }

        // 切换预览选项
        function changePreviewOption(delta) {
            const newSlc = currentPreviewSlc + delta;
            if (newSlc >= 0 && newSlc <= maxOptionCount) {
                currentPreviewSlc = newSlc;
                updateOptionButtons();

                // 如果正在播放，重新开始以应用新选项
                if (isPlaying) {
                    stopPreview();
                    playPreview();
                } else {
                    // 显示当前帧
                    showPreviewFrame(0);
                }
            }
        }

        // 显示指定预览帧
        function showPreviewFrame(frameIndex) {
            if (generatedFrames.length === 0 || frameIndex >= generatedFrames.length) return;

            const previewContent = document.getElementById('preview-content');
            const previewInfo = document.getElementById('preview-info');
            const frame = generatedFrames[frameIndex];

            const htmlContent = frame.lines.map(line => parseToHTML(line, false)).join('<br>');
            previewContent.innerHTML = htmlContent;
            previewInfo.textContent = `帧 ${frameIndex + 1} / ${generatedFrames.length} | slc=${currentPreviewSlc}`;
        }

        function convert() {
            const input = inputText.value;
            const selectorParam = document.getElementById('selector-param').value || '[]';
            const lineSuffix = document.getElementById('line-suffix').value;
            const selHead = document.getElementById('sel-head').value;
            const selTail = document.getElementById('sel-tail').value;
            const unselHead = document.getElementById('unsel-head').value;
            const unselTail = document.getElementById('unsel-tail').value;
            const outputArea = document.getElementById('output-text');

            try {
                const lines = input.split('\n');
                let allFrameGroups = [];
                let currentLines = [];
                let currentOptions = [];
                let lastFrameNum = 0;
                let currentFrameNums = [];
                let currentEndArgs = { a: 'none', reverse: false };
                let hasFrameDef = false;

                function processCurrentFrame() {
                    if (!hasFrameDef || currentLines.length === 0) return;

                    // 收集所有行内选项
                    const allOptions = new Set();
                    for (const line of currentLines) {
                        if (typeof line === 'string') {
                            const opts = parseInlineOptions(line);
                            for (const opt of opts) {
                                allOptions.add(opt.index);
                            }
                        }
                    }

                    // 确定最大选项索引，如果没有选项则默认为0
                    let maxOptionIndex = Math.max(...allOptions, 0);

                    for (const frameNum of currentFrameNums) {
                        const frameGroup = {
                            num: frameNum,
                            options: []
                        };

                        // 为每个slc值生成内容（包括slc=0表示无选择）
                        for (let slc = 0; slc <= maxOptionIndex; slc++) {
                            const contentLines = [];

                            for (const line of currentLines) {
                                if (typeof line === 'string') {
                                    // 替换行内选项标记
                                    const processedLine = replaceInlineOptions(
                                        line, slc, selHead, selTail, unselHead, unselTail
                                    );
                                    contentLines.push(processedLine);
                                } else if (line.type === 'option') {
                                    // 处理旧格式的独立选项行（向后兼容）
                                    const optContent = line.content || '';
                                    const markedContent = applyOptionMarks(
                                        optContent,
                                        line.index,
                                        slc,
                                        selHead, selTail, unselHead, unselTail
                                    );
                                    contentLines.push(markedContent);
                                }
                            }

                            const animFrames = generateAnimationFrames(
                                contentLines,
                                currentEndArgs.a,
                                lineSuffix,
                                currentEndArgs.reverse
                            );

                            frameGroup.options.push({
                                slc: slc,
                                frames: animFrames
                            });
                        }

                        allFrameGroups.push(frameGroup);
                        lastFrameNum = frameNum;
                    }
                }

                for (let i = 0; i < lines.length; i++) {
                    const line = lines[i];
                    const trimmed = line.trim();

                    if (!trimmed && !hasFrameDef) continue;

                    const frameResult = parseFrameSyntax(trimmed, lastFrameNum);
                    if (frameResult) {
                        processCurrentFrame();

                        currentFrameNums = frameResult;
                        currentLines = [];
                        currentOptions = [];
                        currentEndArgs = { a: 'none', reverse: false };
                        hasFrameDef = true;
                        continue;
                    }

                    // 检测旧格式：整行都是选项 $sN{内容}
                    const option = parseOption(trimmed);
                    if (option) {
                        currentOptions.push(option);
                        currentLines.push({ type: 'option', index: option.index, content: option.content });
                        continue;
                    }

                    if (trimmed.startsWith('$end')) {
                        currentEndArgs = parseEndArgs(trimmed);
                        processCurrentFrame();

                        currentLines = [];
                        currentOptions = [];
                        currentFrameNums = [];
                        currentEndArgs = { a: 'none', reverse: false };
                        hasFrameDef = false;
                        continue;
                    }

                    if (hasFrameDef && line) {
                        // 保留原始行，选项会在processCurrentFrame中处理
                        currentLines.push(line);
                    }
                }

                if (hasFrameDef && currentLines.length > 0) {
                    processCurrentFrame();
                }

                if (allFrameGroups.length === 0) {
                    throw new Error('未找到有效的帧定义');
                }

                // 计算最大选项数
                maxOptionCount = 0;
                for (const group of allFrameGroups) {
                    if (group.options.length > maxOptionCount) {
                        maxOptionCount = group.options.length;
                    }
                }

                // 保存帧组数据
                frameGroups = allFrameGroups;

                // 生成输出
                let output = '';
                let lastOutputFrameNum = null;
                let globalFrameOffset = 0;  // 全局帧偏移量，跨 frameGroup 累积

                for (const frameGroup of allFrameGroups) {
                    if (lastOutputFrameNum !== null && frameGroup.num !== lastOutputFrameNum) {
                        output += '\n';
                    }

                    // 获取最大动画帧数
                    const maxAnimFrames = Math.max(...frameGroup.options.map(opt => opt.frames.length), 0);

                    // 按动画帧索引遍历，同一帧索引的不同 slc 共用 frame 编号
                    for (let frameIdx = 0; frameIdx < maxAnimFrames; frameIdx++) {
                        const frameNum = globalFrameOffset + frameIdx;  // 帧编号 = 全局偏移 + 当前索引

                        for (const option of frameGroup.options) {
                            if (frameIdx < option.frames.length) {
                                const frame = option.frames[frameIdx];
                                const content = frame.lines.join('\n');
                                const selector = parseSelector(selectorParam, frameNum, option.slc);
                                const rawtext = JSON.stringify({ rawtext: [{ text: content }] }, null, 0);
                                output += `titleraw ${selector} actionbar ${rawtext}\n`;
                            }
                        }
                    }

                    lastOutputFrameNum = frameGroup.num;
                    globalFrameOffset += maxAnimFrames;  // 更新全局偏移量
                }

                // 根据当前预览选项生成预览帧
                regeneratePreviewFrames();

                outputArea.value = output.trim();
                outputArea.classList.remove('error');

                // 重置预览选项为0
                currentPreviewSlc = 0;
                updateOptionButtons();

                document.getElementById('preview-content').textContent =
                    `点击"预览动画"按钮查看效果 (${allFrameGroups.length} 帧组, ${generatedFrames.length} 动画帧, ${maxOptionCount} 选项)`;

            } catch (err) {
                outputArea.value = `错误: ${err.message}`;
                outputArea.classList.add('error');
                generatedFrames = [];
                frameGroups = [];
                maxOptionCount = 0;
                updateOptionButtons();
            }
        }

        // 根据当前预览选项重新生成预览帧
        function regeneratePreviewFrames() {
            generatedFrames = [];

            for (const frameGroup of frameGroups) {
                // 找到对应 slc 的选项数据，如果没有则使用 slc=1
                let targetOption = null;

                if (currentPreviewSlc === 0) {
                    // slc=0 时，使用原始内容（无标记）
                    targetOption = frameGroup.options[0];
                } else {
                    for (const opt of frameGroup.options) {
                        if (opt.slc === currentPreviewSlc) {
                            targetOption = opt;
                            break;
                        }
                    }
                }

                if (!targetOption && frameGroup.options.length > 0) {
                    targetOption = frameGroup.options[0];
                }

                if (targetOption) {
                    for (const frame of targetOption.frames) {
                        generatedFrames.push({
                            num: frameGroup.num,
                            lines: frame.lines
                        });
                    }
                }
            }
        }

        let currentFrameIndex = 0;

        function playPreview() {
            if (isPlaying) {
                stopPreview();
                return;
            }

            if (generatedFrames.length === 0) {
                convert();
                if (generatedFrames.length === 0) return;
            }

            isPlaying = true;
            const btn = document.getElementById('preview-btn');
            const speed = parseInt(document.getElementById('preview-speed').value);

            btn.textContent = '⏹ 停止播放';
            btn.classList.add('playing');

            currentFrameIndex = 0;

            function showFrame() {
                if (currentFrameIndex >= generatedFrames.length) {
                    currentFrameIndex = 0;
                }

                showPreviewFrame(currentFrameIndex);
                currentFrameIndex++;
            }

            showFrame();
            playInterval = setInterval(showFrame, speed);
        }

        function stopPreview() {
            isPlaying = false;
            const btn = document.getElementById('preview-btn');
            btn.textContent = '▶ 预览动画';
            btn.classList.remove('playing');

            if (playInterval) {
                clearInterval(playInterval);
                playInterval = null;
            }
        }

        function copyOutput() {
            const outputArea = document.getElementById('output-text');
            const copyBtn = document.querySelector('.copy-btn');

            if (!outputArea.value) {
                return;
            }

            outputArea.select();
            outputArea.setSelectionRange(0, 99999);

            try {
                navigator.clipboard.writeText(outputArea.value).then(() => {
                    showCopiedFeedback(copyBtn);
                }).catch(() => {
                    document.execCommand('copy');
                    showCopiedFeedback(copyBtn);
                });
            } catch (err) {
                document.execCommand('copy');
                showCopiedFeedback(copyBtn);
            }
        }

        function showCopiedFeedback(btn) {
            const originalText = btn.textContent;
            btn.textContent = '✓ 已复制';
            btn.classList.add('copied');
            setTimeout(() => {
                btn.textContent = originalText;
                btn.classList.remove('copied');
            }, 1500);
        }

        // 初始化
        updateOptionButtons();

        function addWatermark(text) {
            const watermark = document.createElement('div');
            watermark.textContent = text;
            watermark.style.cssText = `
                position: fixed;
                bottom: 10px;
                right: 10px;
                font-size: 12px;
                color: rgba(255, 255, 255, 0.3);
                pointer-events: none;
                z-index: 9999;
                user-select: none;
            `;
            document.body.appendChild(watermark);
        }

        addWatermark('StarBloom/SnowballMenuMaker v1.0.2 By NyaCrasin');
    </script>
</body>
