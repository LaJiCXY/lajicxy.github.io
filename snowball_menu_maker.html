<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星绽Minecraft工具箱</title>
    <link rel="icon" type="image/png" href="./icon.png">
    <meta name="theme-color" content="#0a0a0a">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(to top, #1a237e 0%, #0d1642 30%, #000000 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Microsoft YaHei', sans-serif;
            color: #ffffff;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(100, 150, 255, 0.5);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #8888aa;
            margin-bottom: 30px;
        }

        .tool-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .tool-btn {
            padding: 16px 24px;
            font-size: 1.1rem;
            font-weight: 500;
            color: #ffffff;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: block;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

            .tool-btn::before {
                content: '';
                position: absolute;
                top: 0;
                left: -100%;
                width: 100%;
                height: 100%;
                background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
                transition: left 0.5s;
            }

            .tool-btn:hover::before {
                left: 100%;
            }

            .tool-btn:hover {
                transform: translateY(-2px);
                box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
            }

            .tool-btn:active {
                transform: translateY(0);
            }

        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.3;
            }

            50% {
                opacity: 1;
            }
        }

        .watermark {
            position: fixed;
            bottom: 15px;
            right: 15px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(100, 150, 255, 0.3);
            border-radius: 4px;
            font-size: 11px;
            color: rgba(160, 160, 255, 0.6);
            pointer-events: none;
            z-index: 10000;
            backdrop-filter: blur(4px);
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.5rem;
            }

            .tool-btn {
                font-size: 1rem;
                padding: 14px 20px;
            }
        }
    </style>
    <base target="_blank">
</head>
<body>
    <div class="stars" id="stars"></div>

    <div class="container">
        <h1>✦ 星绽Minecraft工具箱 ✦</h1>
        <div class="subtitle">便捷实用的Minecraft基岩版开发工具集合</div>

        <div class="tool-list" id="toolList">
            <!-- 工具按钮将在这里动态生成 -->
        </div>
    </div>

    <div class="watermark">星绽Minecraft工具箱</div>

    <script>
        // 工具配置字典
        const tools = {
            "雪球菜单制作器": "./snowball-menu/index.html",
            " titleraw 生成器": "./titleraw/index.html",
            "物品 lore 编辑器": "./lore-editor/index.html",
            "命令方块计时器": "./timer/index.html",
            "JSON 格式化工具": "./json-formatter/index.html"
        };

        // 创建星空背景
        function createStars() {
            const container = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 3 + 's';
                container.appendChild(star);
            }
        }

        // 生成工具按钮
        function generateToolButtons() {
            const list = document.getElementById('toolList');

            for (const [name, uri] of Object.entries(tools)) {
                const btn = document.createElement('a');
                btn.href = uri;
                btn.className = 'tool-btn';
                btn.textContent = name;
                list.appendChild(btn);
            }
        }

        // 初始化
        createStars();
        generateToolButtons();
    </script>
</body>
</html>
